name: Deploy Docs

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Build Documentation
        run: echo "Static docs placeholder"
      - name: Deploy
        uses: actions/upload-pages-artifact@v3
